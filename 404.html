<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — LoopStack AI</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080A0F; --bg-card: #111520; --border: rgba(255,255,255,0.07);
      --cyan: #00E5FF; --cyan-dim: rgba(0,229,255,0.12);
      --white: #F0F2F5; --grey: #6B7280; --grey-lt: #9CA3AF;
      --font-display: 'Syne', sans-serif; --font-body: 'Instrument Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--white); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    .code { font-family: var(--font-display); font-size: clamp(80px, 15vw, 160px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: var(--cyan); opacity: 0.15; margin-bottom: 0; }
    h1 { font-family: var(--font-display); font-size: clamp(24px, 3vw, 36px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; margin-top: -16px; }
    p { font-size: 17px; color: var(--grey-lt); line-height: 1.7; max-width: 420px; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn { background: var(--cyan); color: #080A0F; font-family: var(--font-body); font-weight: 700; font-size: 15px; padding: 12px 24px; border-radius: 10px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn-ghost { color: var(--grey-lt); font-size: 15px; font-weight: 500; padding: 12px 0; transition: color 0.2s; }
    .btn-ghost:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or may have moved. Head back to the homepage or explore our services.</p>
  <div class="links">
    <a href="/" class="btn">Back to Home</a>
    <a href="/ai-automation-consultant.html" class="btn-ghost">AI Consulting →</a>
    <a href="/#booking" class="btn-ghost">Book a Call →</a>
  </div>
</body>
</html>
